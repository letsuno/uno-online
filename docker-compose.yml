services:
  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n '${REDIS_PASSWORD}' ]; then
        redis-server --requirepass '${REDIS_PASSWORD}';
      else
        redis-server;
      fi"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: djkcyl/uno-online-server:latest
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_PATH: ${DATABASE_PATH:-/data/uno.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-uno-online-dev-secret-at-least-32-chars}
      DOMAIN: ${DOMAIN:-localhost}
      DEV_MODE: ${DEV_MODE:-true}
      PORT: "3001"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  caddy:
    image: djkcyl/uno-online-caddy:latest
    depends_on:
      - server
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  mumble:
    image: mumblevoip/mumble-server:latest
    ports:
      - "${MUMBLE_PORT:-64738}:64738/tcp"
      - "${MUMBLE_PORT:-64738}:64738/udp"
    volumes:
      - mumble_data:/data
    environment:
      MUMBLE_SUPERUSER_PASSWORD: ${MUMBLE_SUPERUSER_PASSWORD:-admin}
      MUMBLE_CONFIG_allowTemporaryChannels: "true"
    restart: unless-stopped

  mumble-gateway:
    image: djkcyl/uno-online-mumble-gateway:latest
    depends_on:
      - mumble
    ports:
      - "${MUMBLE_GATEWAY_PORT:-64737}:64737"
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
  mumble_data:
