services:
  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n '${REDIS_PASSWORD}' ]; then
        redis-server --requirepass '${REDIS_PASSWORD}';
      else
        redis-server;
      fi"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: djkcyl/uno-online-server:latest
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_PATH: ${DATABASE_PATH:-/data/uno.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-uno-online-dev-secret-at-least-32-chars}
      DOMAIN: ${DOMAIN:-localhost}
      DEV_MODE: ${DEV_MODE:-true}
      ROOM_IDLE_TIMEOUT_MS: ${ROOM_IDLE_TIMEOUT_MS:-7200000}
      GITHUB_PROXY: ${GITHUB_PROXY:-}
      MUMBLE_ICE_ENABLED: ${MUMBLE_ICE_ENABLED:-true}
      MUMBLE_ICE_HOST: ${MUMBLE_ICE_HOST:-mumble}
      MUMBLE_ICE_PORT: ${MUMBLE_ICE_PORT:-6502}
      MUMBLE_ICE_SECRET: ${MUMBLE_ICE_SECRET:-uno-online-mumble-ice-secret}
      MUMBLE_ICE_SERVER_ID: ${MUMBLE_ICE_SERVER_ID:-1}
      MUMBLE_ICE_PARENT_CHANNEL_ID: ${MUMBLE_ICE_PARENT_CHANNEL_ID:-0}
      MUMBLE_CHANNEL_PREFIX: ${MUMBLE_CHANNEL_PREFIX:-UNO }
      PORT: "3001"
    volumes:
      - ./data/sqlite:/data
    restart: unless-stopped

  caddy:
    image: djkcyl/uno-online-caddy:latest
    depends_on:
      - server
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    restart: unless-stopped

  mumble:
    image: mumblevoip/mumble-server:latest
    ports:
      - "${MUMBLE_PORT:-64738}:64738/tcp"
      - "${MUMBLE_PORT:-64738}:64738/udp"
    volumes:
      - ./data/mumble:/data
    environment:
      MUMBLE_SUPERUSER_PASSWORD: ${MUMBLE_SUPERUSER_PASSWORD:-admin}
      MUMBLE_CONFIG_ICE: ${MUMBLE_CONFIG_ICE:-tcp -h 0.0.0.0 -p 6502}
      MUMBLE_CONFIG_ICESECRETWRITE: ${MUMBLE_ICE_SECRET:-uno-online-mumble-ice-secret}
    restart: unless-stopped

  mumble-gateway:
    image: djkcyl/uno-online-mumble-gateway:latest
    volumes:
      - ./mumble-gateway.config.json:/app/config/config.json:ro
    depends_on:
      - mumble
    ports:
      - "${MUMBLE_GATEWAY_PORT:-64737}:64737"
    restart: unless-stopped
